services:
  mongodb:
    image: mongo:7
    container_name: tareas-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: tgustafsson/tareas-backend:latest
    pull_policy: always
    container_name: tareas-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      PORT: "8080"
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: taskmanager
    ports:
      - "8080:8080"

  frontend:
    image: tgustafsson/tareas-frontend:latest
    pull_policy: always
    container_name: tareas-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8080
    ports:
      - "3000:3000"

volumes:
  mongo_data:
